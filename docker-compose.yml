services:
  backup-check:
    build: .
    image: backup-check:latest
    container_name: backup-check
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_PATH=/app/data/backup.db
      - TZ=Europe/Berlin
      # Token for /api/sync (Veeam PowerShell integration)
      - SYNC_TOKEN=${SYNC_TOKEN:-}
      # JWT signing key for user sessions. MUST be set for production!
      # Generate e.g.: [guid]::NewGuid().Guid
      - AUTH_SECRET=${AUTH_SECRET:-}
      # Set to 1 if serving over HTTPS (reverse proxy). Default: 0 for LAN HTTP.
      - COOKIE_SECURE=${COOKIE_SECURE:-0}
      # Initial admin credentials (only used if users table is empty)
      - INITIAL_ADMIN_USERNAME=${INITIAL_ADMIN_USERNAME:-admin}
      - INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD:-admin}
    restart: unless-stopped
